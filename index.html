<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Marketplace - Buy & Sell</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="olx-header">
        <div class="header-container">
            <div class="logo">
                <img src="https://images.seeklogo.com/logo-png/48/1/olx-logo-png_seeklogo-487460.png" alt="Logo">
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search user posted ads...">
                <button id="searchBtn">🔍</button>
            </div>

            <div class="header-buttons">
                <div id="authLinks">
                    <button id="loginBtn" class="login-btn-link">Login</button>
                </div>
                
                <div id="userProfile" class="hidden">
                    <span id="userNameDisplay"></span>
                    <button id="logoutBtn" class="btn">Logout</button>
                </div>

                <a href="#" class="sell-btn">+ SELL</a>
            </div>
        </div>
    </header>

    <div id="overlay" class="overlay hidden"></div>

    <div id="loginForm" class="container hidden">
        <div class="heading">Sign In</div>
        <form class="form">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-button">Login</button>
        </form>
        <p class="agreement">New here? <a href="#" id="showSignup">Create Account</a></p>
    </div>
  
    <div id="signupForm" class="container hidden">
        <div class="heading">Create Account</div>
        <form class="form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-button">Sign Up</button>
        </form>
        <p class="agreement">Already have an account? <a href="#" id="showLogin">Sign In</a></p>
    </div>

    <div id="sellForm" class="container hidden">
        <div class="heading">Sell Your Item</div>
        <form class="form" id="postAdForm">
            <input type="text" id="adTitle" placeholder="What are you selling?" required>
            <input type="number" id="adPrice" placeholder="Price ($)" required>
            <input type="number" id="adDiscount" placeholder="Discount (%)" value="0">
            <input type="url" id="adThumbnail" placeholder="Image URL (Unsplash/Google)">
            <textarea id="adDesc" placeholder="Describe your item..." required style="height: 80px;"></textarea>
            <button type="submit" class="login-button">Post Ad Now</button>
        </form>
    </div>

    <main class="main-content">
        <h2 style="max-width: 1200px; margin: 20px auto; padding: 0 15px;">Recent Ads</h2>
        <div id="products">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
